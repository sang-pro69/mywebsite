<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Quản Lý Tiến Độ Công Việc</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

</head>

<body>

<div class="container">

    <header>

        <h1>
            <i class="fa-solid fa-list-check"></i>
            QUẢN LÝ TIẾN ĐỘ CÔNG VIỆC
        </h1>

    </header>

    <!-- Dashboard -->

    <section class="dashboard">

        <div class="card blue">
            <h2 id="tongCongViec">0</h2>
            <p>Tổng công việc</p>
        </div>

        <div class="card green">
            <h2 id="hoanThanh">0</h2>
            <p>Hoàn thành</p>
        </div>

        <div class="card orange">
            <h2 id="dangLam">0</h2>
            <p>Đang thực hiện</p>
        </div>

        <div class="card red">
            <h2 id="chuaLam">0</h2>
            <p>Chưa thực hiện</p>
        </div>

    </section>

    <!-- Thanh công cụ -->

    <section class="toolbar">

        <input
            type="text"
            id="txtSearch"
            placeholder="🔍 Tìm kiếm công việc...">

        <button id="btnAdd">
            <i class="fa-solid fa-plus"></i>
            Thêm công việc
        </button>

    </section>

    <!-- Bảng -->

    <div class="table-box">

        <table id="tblCongViec">

            <thead>

            <tr>

                <th width="60">STT</th>

                <th>Nội dung công việc</th>

                <th width="160">Tiến độ</th>

                <th width="180">Người thực hiện</th>

                <th width="150">Thao tác</th>

            </tr>

            </thead>

            <tbody id="tblBody">

                <!-- Dữ liệu sẽ thêm bằng JavaScript -->

            </tbody>

        </table>

    </div>

</div>

<!-- ========================= -->
<!-- Popup thêm / sửa -->
<!-- ========================= -->

<div class="modal" id="modal">

    <div class="modal-content">

        <h2 id="modalTitle">

            Thêm công việc

        </h2>

        <input
            type="hidden"
            id="editIndex">

        <div class="form-group">

            <label>

                Nội dung công việc

            </label>

            <input
                type="text"
                id="txtCongViec">

        </div>

        <div class="form-group">

            <label>

                Tiến độ (%)

            </label>

            <input
                type="number"
                id="txtTienDo"
                min="0"
                max="100">

        </div>

        <div class="form-group">

            <label>

                Người thực hiện

            </label>

            <input
                type="text"
                id="txtNguoi">

        </div>

        <div class="modal-button">

            <button class="save" id="btnSave">

                <i class="fa-solid fa-floppy-disk"></i>

                Lưu

            </button>

            <button class="cancel" id="btnCancel">

                <i class="fa-solid fa-xmark"></i>

                Hủy

            </button>

        </div>

    </div>

</div>

<!-- ========================= -->
<!-- Popup xác nhận xóa -->
<!-- ========================= -->

<div class="modal" id="deleteModal">

    <div class="modal-content delete-box">

        <h2>

            Xóa công việc

        </h2>

        <p>

            Bạn có chắc muốn xóa công việc này?

        </p>

        <div class="modal-button">

            <button class="delete" id="btnDelete">

                Xóa

            </button>

            <button class="cancel" id="btnDeleteCancel">

                Hủy

            </button>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
